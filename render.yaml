# Despliegue del API en Render
# https://render.com — New Web Service → conecta el repo, rootDir: server

services:
  - type: web
    name: mati-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_SHEETS_WEBHOOK_URL
        sync: false
      - key: GOOGLE_SHEETS_SECRET
        sync: false
